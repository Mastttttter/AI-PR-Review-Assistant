# Dispatcher server configuration template
# Copy to config.yaml and fill in your real credentials.
#
# Environment variables:
#   DISPATCHER_PORT             - Override server port (default: 8318)
#   DISPATCHER_LLM_MODEL        - Override OpenAI model name
#   DISPATCHER_ANTHROPIC_MODEL  - Override Anthropic model name
#   DISPATCHER_KEY_TTL          - Temp key TTL in seconds (default: 600)

# Public base URI reported in API responses (e.g., /api/issue-key).
# When empty, defaults to "http://127.0.0.1:{port}".
# base-uri: "http://www.ycit.xyz:8318"

# Server port
port: 8318

# Directory for authentication token files (default: ~/.cli-proxy-api)
auth-dir: "./auths"

# Static API keys for client access
api-keys:
  - "static-admin-key"

